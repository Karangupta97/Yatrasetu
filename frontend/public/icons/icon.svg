<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#748efe"/>
  
  <!-- Ticket icon (centered) -->
  <g transform="translate(256,256)">
    <!-- Ticket body -->
    <rect x="-140" y="-90" width="280" height="180" rx="18" fill="white" opacity="0.95"/>
    <!-- Notches (left and right) -->
    <circle cx="-140" cy="0" r="22" fill="#748efe"/>
    <circle cx="140" cy="0" r="22" fill="#748efe"/>
    <!-- Dashed separator -->
    <line x1="-108" y1="0" x2="108" y2="0" stroke="#748efe" stroke-width="3" stroke-dasharray="10,6" opacity="0.5"/>
    <!-- Train silhouette (top half) -->
    <rect x="-80" y="-65" width="160" height="45" rx="8" fill="#748efe" opacity="0.15"/>
    <rect x="-65" y="-65" width="55" height="45" rx="4" fill="#748efe" opacity="0.3"/>
    <rect x="-5" y="-65" width="55" height="45" rx="4" fill="#748efe" opacity="0.3"/>
    <!-- YS monogram (bottom half) -->
    <text x="0" y="60" text-anchor="middle" font-family="'Google Sans', sans-serif" font-size="52" font-weight="800" fill="#748efe" letter-spacing="-2">YS</text>
  </g>
</svg>
